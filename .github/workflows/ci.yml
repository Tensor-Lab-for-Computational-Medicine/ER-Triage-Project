name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run backend tests
        run: python -m pytest

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: ./
          VITE_ED_SIM_API: http://127.0.0.1:8000
        run: npm run build

      - name: Start e2e servers
        shell: bash
        env:
          ED_SIM_ALLOW_MOCK_LLM: "true"
          ED_SIM_ALLOW_UNVALIDATED_GRADER: "true"
          ED_SIM_CASE_DIR: tests/fixtures/no_local_cases
          ED_SIM_LLM_PROVIDER: mock
          VITE_BASE_PATH: ./
        run: |
          set -euo pipefail

          python -m uvicorn backend.api.main:app --host 127.0.0.1 --port 8000 > backend-e2e.log 2>&1 &
          echo "$!" > backend-e2e.pid

          (
            cd frontend
            npm run preview -- --host 127.0.0.1 --port 4173 --strictPort
          ) > frontend-preview.log 2>&1 &
          echo "$!" > frontend-preview.pid

          wait_for_url() {
            local url="$1"
            local label="$2"
            for attempt in {1..60}; do
              if curl -fsS "$url" > /dev/null; then
                echo "$label is ready at $url"
                return 0
              fi
              sleep 2
            done

            echo "::error::$label did not become ready at $url"
            echo "---- backend-e2e.log ----"
            cat backend-e2e.log || true
            echo "---- frontend-preview.log ----"
            cat frontend-preview.log || true
            return 1
          }

          wait_for_url "http://127.0.0.1:8000/health" "backend"
          wait_for_url "http://127.0.0.1:4173" "frontend"

      - name: Run frontend e2e tests
        working-directory: frontend
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          VITE_ED_SIM_API: http://127.0.0.1:8000
        run: npm run test:e2e

      - name: Stop e2e servers
        if: always()
        shell: bash
        run: |
          kill "$(cat backend-e2e.pid)" 2>/dev/null || true
          kill "$(cat frontend-preview.pid)" 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            backend-e2e.log
            frontend-preview.log
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
